<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circleView">
      <circle cx="50" cy="50" r="46" />
    </clipPath>
  </defs>
  <!-- Clean white background for transparent image areas -->
  <circle cx="50" cy="50" r="46" fill="#ffffff" />
  <!-- Logo image clipped to circle -->
  <image width="92" height="92" x="4" y="4" href="/business_logo_new.jpg" clip-path="url(#circleView)" />
  <!-- Elegant brand-color circular border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#863bff" stroke-width="3" />
</svg>