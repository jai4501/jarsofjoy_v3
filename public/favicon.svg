<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circleView">
      <circle cx="50" cy="50" r="46" />
    </clipPath>
  </defs>
  <!-- Clean white background for transparent image areas -->
  <circle cx="50" cy="50" r="46" fill="#ffffff" />
  <!-- Logo image clipped to circle (embedded Base64 WebP) -->
  <image width="92" height="92" x="4" y="4" href="data:image/webp;base64," clip-path="url(#circleView)" />
  <!-- Elegant brand-color circular border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#B5545A" stroke-width="4" />
</svg>